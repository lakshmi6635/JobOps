name: CI/CD Pipeline #2
run-name: "Commit ${{ github.sha }} pushed by ${{ github.actor }}"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show info
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
